  .match-row.predicted .matchup-main { color: #555; font-style: italic; }

  .predicted-badge { font-size: 10px; color: #888; font-style: italic; }
  .venue { font-size: 11px; color: #777; text-align: right; line-height: 1.3; }
  .no-results { color: #999; font-size: 14px; padding: 2rem 1rem; text-align: center; }

let activeFilter = 'all';

function filterSection(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function isWatchGame(matchup) {
  const clean = matchup.replace(/^predicted:\s*/i, '');

  // Favorite teams from the earlier highlight list.
  const favoriteTeamPattern = /\b(France|Portugal|Mexico|Japan|Ivory Coast)\b/;
  if (favoriteTeamPattern.test(clean)) return true;

  // Extra hand-picked "most fun" matches.
  const extraWatchGames = [
    "Brazil vs Morocco",
    "Netherlands vs Japan",
    "USA vs Türkiye",
    "France vs Uruguay",
    "Mexico vs Senegal",
    "France vs Brazil",
    "France vs Argentina",
    "France vs England",
    "Portugal vs Colombia",
    "France vs Portugal"
  ];

  return extraWatchGames.includes(clean);
}

function render() {
  let rows = data;
  if (activeFilter === 'knockout') rows = data.filter(r => r.s !== 'Group stage');
  if (activeFilter === 'watch') rows = data.filter(r => isWatchGame(r.m));

  const el = document.getElementById('schedule');
  if (!rows.length) {
    el.innerHTML = '<p class="no-results">No matches for this filter.</p>';
    return;
  }

  let html = '';
  let lastSection = '', lastDay = '';

  rows.forEach(r => {
    if (r.s !== lastSection) {
      html += `<div class="section-header">${r.s}</div>`;
      lastSection = r.s;
      lastDay = '';
    }

    if (r.d !== lastDay) {
      html += `<div class="day-label">${r.d}</div>`;
      lastDay = r.d;
    }

    const predBadge = r.p ? '<span class="predicted-badge">predicted</span>' : '';
    const watch = isWatchGame(r.m);

    html += `<div class="match-row${watch ? ' watch' : ''}${r.p ? ' predicted' : ''}">
      <span class="time">${r.t}</span>
      <span class="channel ${r.ch === 'FOX' ? 'fox' : 'fs1'}">${r.ch}</span>
      <span>
        <div class="matchup-main">${r.m}</div>
        <div class="matchup-sub">${r.g} ${predBadge}</div>
      </span>
      <span class="venue">${r.v}</span>
    </div>`;
  });

  el.innerHTML = html;
}
