<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jerome's Apps</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #111; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { padding: 2rem 1rem; max-width: 480px; width: 100%; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
  .sub { font-size: 13px; color: #888; margin-bottom: 2rem; }
  .app-list { display: flex; flex-direction: column; gap: 12px; }
  a.app-card { display: block; background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 1rem 1.25rem; text-decoration: none; color: inherit; transition: box-shadow 0.15s; }
  a.app-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .app-icon { font-size: 24px; margin-bottom: 0.4rem; }
  .app-name { font-size: 15px; font-weight: 600; margin-bottom: 0.2rem; }
  .app-desc { font-size: 13px; color: #777; }
</style>
</head>
<body>
<div class="container">
  <h1>Jerome's Apps</h1>
  <p class="sub">Personal tools — not public</p>
  <div class="app-list">
    <a class="app-card" href="worldcup.html">
      <div class="app-icon">⚽</div>
      <div class="app-name">2026 FIFA World Cup</div>
      <div class="app-desc">Full schedule with watch list and filters</div>
    </a>
    <a class="app-card" href="summer.html">
      <div class="app-icon">☀️</div>
      <div class="app-name">NYC Summer 2026</div>
      <div class="app-desc">Concerts, films, theater and more</div>
    </a>
    <a class="app-card" href="hdr.html">
      <div class="app-icon">🎬</div>
      <div class="app-name">4K HDR / Dolby Vision Watchlist</div>
      <div class="app-desc">Jerome's curated HDR film collection</div>
    </a>
  </div>
</div>
</body>
</html>
